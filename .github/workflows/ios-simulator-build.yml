name: iOS Simulator Build (Appetize)

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - 'ios/**'
      - '.github/workflows/ios-simulator-build.yml'

jobs:
  build-ios:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Sync engine JSON (Android → iOS)
        run: |
          cp -f app/src/main/assets/engine/* ios/Barem/Barem/Resources/engine/
          cp -f app/src/main/assets/memur/* ios/Barem/Barem/Resources/memur/

      - name: Build Barem for iOS Simulator
        run: |
          set -euo pipefail
          cd ios/Barem
          xcodebuild \
            -project Barem.xcodeproj \
            -scheme Barem \
            -sdk iphonesimulator \
            -configuration Debug \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=YES \
            build
          APP=build/Build/Products/Debug-iphonesimulator/Barem.app
          test -d "$APP"
          test -f "$APP/Barem"
          find "$APP" -name 'h_engine_full.json' -print | grep -q .

      - name: Sign simulator bundle
        run: |
          APP=ios/Barem/build/Build/Products/Debug-iphonesimulator/Barem.app
          codesign --force --sign - "$APP"

      - name: Package for Appetize
        run: |
          cd ios/Barem/build/Build/Products/Debug-iphonesimulator
          zip -ry "$GITHUB_WORKSPACE/Barem-appetize.zip" Barem.app
          unzip -l "$GITHUB_WORKSPACE/Barem-appetize.zip" | grep 'Barem.app/Barem$'

      - uses: actions/upload-artifact@v4
        with:
          name: APPETIZE-UPLOAD-THIS-ZIP
          path: Barem-appetize.zip
          retention-days: 30
